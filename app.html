<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // Electron 檔案系統支援
        const fs = window.require ? window.require('fs') : null;
        const path = window.require ? window.require('path') : null;
        
        // 資料檔案路徑 - 統一使用專案根目錄，讓 git 可以追蹤
        const getDataPath = () => {
            if (fs && path) {
                let projectRoot;
                try {
                    // 判斷是否為打包環境：檢查路徑中是否包含 node_modules
                    const isPackaged = process.resourcesPath && !process.resourcesPath.includes('node_modules');
                    
                    if (isPackaged) {
                        // 打包後的 exe：從 resources 目錄往上找專案根目錄
                        // 路徑結構：MyCalculator/分攤計算器-win32-x64/resources/app/
                        // 我們要往上兩層到 分攤計算器-win32-x64，再往上一層到 MyCalculator
                        const resourcesDir = path.dirname(process.resourcesPath); // 分攤計算器-win32-x64
                        projectRoot = path.join(resourcesDir, '..'); // MyCalculator (專案根目錄)
                        
                        // 驗證是否找到正確的專案根目錄
                        if (!fs.existsSync(path.join(projectRoot, 'package.json'))) {
                            // 如果沒找到，嘗試其他路徑
                            projectRoot = resourcesDir;
                        }
                        console.log('[打包模式] 專案根目錄:', projectRoot);
                    } else {
                        // 開發環境：直接使用 process.cwd()，因為執行 npm start 時就在專案根目錄
                        projectRoot = process.cwd();
                        console.log('[開發模式] 使用 process.cwd() 作為專案根目錄:', projectRoot);
                        
                        // 驗證 package.json 是否存在
                        const packagePath = path.join(projectRoot, 'package.json');
                        if (!fs.existsSync(packagePath)) {
                            console.warn('[開發模式] 警告：在當前目錄找不到 package.json:', packagePath);
                        } else {
                            console.log('[開發模式] 確認找到 package.json');
                        }
                    }
                } catch (e) {
                    console.error('無法取得專案路徑:', e);
                    projectRoot = process.cwd();
                }
                
                const dataDir = path.join(projectRoot, 'data');
                // 確保 data 資料夾存在
                if (!fs.existsSync(dataDir)) {
                    fs.mkdirSync(dataDir, { recursive: true });
                }
                
                const historyPath = path.join(dataDir, 'history.json');
                console.log('歷史記錄儲存位置:', historyPath);
                return historyPath;
            }
            return null;
        };
        
        // 讀取歷史紀錄檔案
        const loadHistoryFromFile = () => {
            const dataPath = getDataPath();
            if (dataPath && fs && fs.existsSync(dataPath)) {
                try {
                    console.log('載入歷史紀錄從:', dataPath);
                    const data = fs.readFileSync(dataPath, 'utf-8');
                    return JSON.parse(data);
                } catch (e) {
                    console.error('讀取歷史紀錄失敗:', e);
                    return [];
                }
            } else {
                console.log('歷史紀錄檔案不存在:', dataPath);
                return [];
            }
        };
        
        // 儲存歷史紀錄到檔案
        const saveHistoryToFile = (historyData) => {
            const dataPath = getDataPath();
            if (dataPath && fs) {
                try {
                    console.log('儲存歷史紀錄到:', dataPath);
                    fs.writeFileSync(dataPath, JSON.stringify(historyData, null, 2), 'utf-8');
                    console.log('歷史紀錄儲存成功');
                    return true;
                } catch (e) {
                    console.error('儲存歷史紀錄失敗:', e);
                    return false;
                }
            }
            console.log('無法儲存歷史紀錄，dataPath 或 fs 不可用');
            return false;
        };

        const SimpleIcon = ({ name, size = 20, className = "" }) => {
            const icons = {
                wallet: <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" />,
                plus: <path d="M12 5v14M5 12h14" />,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />,
                check: <path d="m22 2-11 11-5-5" />,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                chevronRight: <path d="m9 18 6-6-6-6" />,
                chart: <path d="M3 3v18h18M18 17V9M13 17V5M8 17v-3" />,
                checkSquare: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><path d="m9 12 2 2 4-4" /></g>,
                square: <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />,
                info: <g><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></g>,
                calendar: <path d="M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM16 2v4M8 2v4M3 10h18" />,
                users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
            };

            return (
                <svg 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('current');
            const [members, setMembers] = useState(() => {
                const saved = localStorage.getItem('members_v2');
                return saved ? JSON.parse(saved) : ['二哥', '大哥', '三弟', '倩瑜'];
            });
            const [isMemberModalOpen, setIsMemberModalOpen] = useState(false);
            const [newMemberName, setNewMemberName] = useState('');
            
            const [expenses, setExpenses] = useState(() => {
                const saved = localStorage.getItem('expenses_v8');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [history, setHistory] = useState(() => {
                // 優先從檔案讀取，若檔案不存在則從 localStorage 遷移
                const fileData = loadHistoryFromFile();
                if (fileData.length > 0) {
                    return fileData;
                }
                // 遷移舊資料
                const saved = localStorage.getItem('history_v8');
                if (saved) {
                    const oldData = JSON.parse(saved);
                    saveHistoryToFile(oldData);
                    localStorage.removeItem('history_v8');
                    return oldData;
                }
                return [];
            });

            const [viewingRecord, setViewingRecord] = useState(null);
            const [editingRecord, setEditingRecord] = useState(null);
            const [isEditMode, setIsEditMode] = useState(false);
            const [confirmStep, setConfirmStep] = useState(0);
            
            // 上期餘額開關（可選功能）
            const [applyPreviousBalance, setApplyPreviousBalance] = useState(() => {
                const saved = localStorage.getItem('applyPreviousBalance');
                return saved ? JSON.parse(saved) : true; // 預設開啟
            });

            // 公平分攤模式開關（新功能）
            const [useFairSplit, setUseFairSplit] = useState(() => {
                const saved = localStorage.getItem('useFairSplit');
                return saved ? JSON.parse(saved) : false; // 預設關閉
            });

            // 大哥扣打額度（每月1萬，會累加）
            const [daGeQuota, setDaGeQuota] = useState(() => {
                const saved = localStorage.getItem('daGeQuota');
                return saved ? JSON.parse(saved) : 10000; // 預設1萬
            });

            // 計算上期餘額（從最新的歷史記錄中取得）
            const previousBalance = useMemo(() => {
                if (history.length === 0) return {};
                const lastRecord = history[0]; // 最新的記錄
                const balance = {};
                
                // 從上期的 summary.details 計算每個人的餘額
                Object.keys(lastRecord.summary.details).forEach(member => {
                    const detail = lastRecord.summary.details[member];
                    // 餘額 = 實付 - 應付（正數表示多付，負數表示少付）
                    balance[member] = detail.paid - detail.shouldPay;
                });
                
                return balance;
            }, [history]);

            useEffect(() => {
                localStorage.setItem('members_v2', JSON.stringify(members));
            }, [members]);

            useEffect(() => {
                localStorage.setItem('expenses_v8', JSON.stringify(expenses));
            }, [expenses]);
            
            useEffect(() => {
                localStorage.setItem('applyPreviousBalance', JSON.stringify(applyPreviousBalance));
            }, [applyPreviousBalance]);
            
            useEffect(() => {
                localStorage.setItem('useFairSplit', JSON.stringify(useFairSplit));
            }, [useFairSplit]);
            
            useEffect(() => {
                localStorage.setItem('daGeQuota', JSON.stringify(daGeQuota));
            }, [daGeQuota]);
            
            useEffect(() => {
                // 將歷史紀錄儲存到檔案
                saveHistoryToFile(history);
            }, [history]);

            const handleAddMember = () => {
                if (newMemberName && !members.includes(newMemberName)) {
                    setMembers([...members, newMemberName]);
                    setNewMemberName('');
                }
            };

            const handleRemoveMember = (member) => {
                if (members.length > 2) {
                    setMembers(members.filter(m => m !== member));
                } else {
                    alert("至少需要兩位成員");
                }
            };

            // 債務優化算法：計算最少轉帳次數的清算方案
            const optimizeTransfers = (stats) => {
                // 1. 計算每個人的淨餘額（正數=債權人，負數=債務人）
                const balances = [];
                Object.keys(stats).forEach(member => {
                    const net = stats[member].paid - stats[member].shouldPay;
                    if (Math.abs(net) > 0.01) { // 忽略小於1分的誤差
                        balances.push({ member, net });
                    }
                });

                // 2. 分離債權人和債務人
                const creditors = balances.filter(b => b.net > 0).sort((a, b) => b.net - a.net);
                const debtors = balances.filter(b => b.net < 0).sort((a, b) => a.net - b.net);

                // 3. 特殊情況處理
                const result = {
                    transfers: [],
                    type: 'normal', // normal, all_overpaid, all_underpaid
                    totalOverpaid: 0,
                    totalUnderpaid: 0,
                    averageBalance: 0,
                    balanceDetails: [] // 用於顯示每個人相對於平均值的差異
                };

                // 計算總多付和總少付
                result.totalOverpaid = creditors.reduce((sum, c) => sum + c.net, 0);
                result.totalUnderpaid = Math.abs(debtors.reduce((sum, d) => sum + d.net, 0));

                // 檢查特殊情況：所有人都多付了
                if (debtors.length === 0 && creditors.length > 0) {
                    result.type = 'all_overpaid';
                    
                    // 計算平均每人應該多付多少（公平分攤）
                    const totalMembers = creditors.length;
                    result.averageBalance = result.totalOverpaid / totalMembers;
                    
                    // 計算每個人相對於平均值的差異
                    const adjustedBalances = creditors.map(c => ({
                        member: c.member,
                        original: c.net, // 原始多付金額
                        shouldBe: result.averageBalance, // 應該多付的金額（平均值）
                        adjustment: c.net - result.averageBalance // 需要調整的金額（正=退還，負=補足）
                    }));
                    
                    result.balanceDetails = adjustedBalances;
                    
                    // 計算相互抵銷的轉帳方案
                    // 將需要退款的人（多付超過平均）和需要補款的人（多付低於平均）配對
                    const needRefund = adjustedBalances.filter(b => b.adjustment > 0.01).sort((a, b) => b.adjustment - a.adjustment);
                    const needPay = adjustedBalances.filter(b => b.adjustment < -0.01).sort((a, b) => a.adjustment - b.adjustment);
                    
                    let i = 0, j = 0;
                    while (i < needRefund.length && j < needPay.length) {
                        const refunder = needRefund[i]; // 需要拿回錢的人
                        const payer = needPay[j]; // 需要補錢的人
                        const amount = Math.min(refunder.adjustment, Math.abs(payer.adjustment));
                        
                        if (amount > 0.01) {
                            result.transfers.push({
                                from: payer.member,
                                to: refunder.member,
                                amount: Math.round(amount)
                            });
                        }
                        
                        refunder.adjustment -= amount;
                        payer.adjustment += amount;
                        
                        if (refunder.adjustment < 0.01) i++;
                        if (Math.abs(payer.adjustment) < 0.01) j++;
                    }
                    
                    return result;
                }
                
                // 檢查特殊情況：所有人都少付了
                if (creditors.length === 0 && debtors.length > 0) {
                    result.type = 'all_underpaid';
                    return result;
                }

                // 4. 計算最優轉帳方案（正常情況）
                let i = 0, j = 0;
                
                while (i < creditors.length && j < debtors.length) {
                    const creditor = creditors[i];
                    const debtor = debtors[j];
                    const amount = Math.min(creditor.net, Math.abs(debtor.net));
                    
                    if (amount > 0.01) {
                        result.transfers.push({
                            from: debtor.member,
                            to: creditor.member,
                            amount: Math.round(amount)
                        });
                    }
                    
                    creditor.net -= amount;
                    debtor.net += amount;
                    
                    if (creditor.net < 0.01) i++;
                    if (Math.abs(debtor.net) < 0.01) j++;
                }

                return result;
            };

            const calculateResults = (expenseList, prevBalance = {}, enableFairSplit = false, currentDaGeQuota = 10000) => {
                const stats = {};
                members.forEach(m => stats[m] = { 
                    paid: 0, 
                    shouldPay: 0, 
                    currentPeriodShouldPay: 0, // 本期原始應付金額
                    previousBalance: prevBalance[m] || 0 
                });
                
                let totalPool = 0; // 總本期公費支出
                let publicFund = 0; // 公用基金（大家多付的部分）

                expenseList.forEach(exp => {
                    const amt = parseFloat(exp.amount) || 0;
                    const splitWith = exp.splitWith || [];
                    if (amt <= 0) return;
                    
                    // 只計算公費到總支出
                    if (exp.type === 'public') {
                        totalPool += amt;
                    }

                    const payer = exp.payer;
                    if (stats[payer]) stats[payer].paid += amt;

                    if (splitWith.length > 0) {
                        const perPerson = amt / splitWith.length;
                        splitWith.forEach(m => {
                            // Only count if member still exists
                            if (stats[m]) {
                                stats[m].shouldPay += perPerson;
                                stats[m].currentPeriodShouldPay += perPerson; // 保留本期原始應付
                            }
                        });
                    }
                });

                // 🆕 公平分攤模式：重新計算每個人的應付金額
                if (enableFairSplit) {
                    // 計算總應付金額（不包含上期餘額）
                    let totalShouldPay = 0;
                    members.forEach(m => {
                        totalShouldPay += stats[m].currentPeriodShouldPay;
                    });
                    
                    // 平均分配給每個成員
                    const averageShouldPay = totalShouldPay / members.length;
                    
                    // 更新每個人的應付金額為平均值
                    members.forEach(m => {
                        if (stats[m]) {
                            stats[m].originalShouldPay = stats[m].currentPeriodShouldPay; // 保存原始應付
                            stats[m].currentPeriodShouldPay = averageShouldPay; // 更新為平均值
                            stats[m].shouldPay = averageShouldPay; // 更新應付金額
                        }
                    });
                }

                // 將上期餘額加入計算（上期多付的人本期應付金額減少，上期少付的人本期應付金額增加）
                // ⚠️ 無論是否公平分攤，上期餘額都要計入（上期欠的債要還）
                members.forEach(m => {
                    if (stats[m] && prevBalance[m]) {
                        // prevBalance[m] > 0 表示上期多付，本期應付減少
                        // prevBalance[m] < 0 表示上期少付，本期應付增加
                        stats[m].shouldPay -= prevBalance[m];
                    }
                });

                // 計算公用基金（所有成員多付的總額）
                members.forEach(m => {
                    const net = stats[m].shouldPay - stats[m].paid;
                    if (net < 0) { // 如果該成員多付了
                        publicFund += Math.abs(net);
                    }
                });

                // 🆕 大哥扣打計算（特殊處理）
                let daGeQuotaInfo = null;
                if (stats['大哥']) {
                    const daGeShouldPay = stats['大哥'].shouldPay;
                    const daGeActualShouldPay = Math.max(0, daGeShouldPay - currentDaGeQuota); // 使用扣打後的實際應付
                    const quotaUsed = Math.min(daGeShouldPay, currentDaGeQuota); // 本期使用的扣打
                    const quotaRemaining = currentDaGeQuota - quotaUsed; // 剩餘扣打
                    
                    daGeQuotaInfo = {
                        originalShouldPay: daGeShouldPay, // 原始應付金額
                        quotaAvailable: currentDaGeQuota, // 可用扣打
                        quotaUsed: quotaUsed, // 本期使用扣打
                        actualShouldPay: daGeActualShouldPay, // 扣打後實際應付
                        quotaRemaining: quotaRemaining, // 本期剩餘扣打
                        nextMonthQuota: quotaRemaining + 10000 // 下期扣打（本期剩餘+1萬）
                    };
                    
                    // 保存扣打信息到 stats
                    stats['大哥'].quotaInfo = daGeQuotaInfo;
                }

                // 計算優化後的轉帳方案
                const transfersResult = optimizeTransfers(stats);

                return { 
                    totalPool,
                    totalPaid: stats['二哥'] ? stats['二哥'].paid : 0,
                    ergeShouldPay: stats['二哥'] ? stats['二哥'].shouldPay : 0,
                    finalBalance: stats['二哥'] ? (stats['二哥'].paid - stats['二哥'].shouldPay) : 0, 
                    publicFund,
                    details: stats,
                    transfers: transfersResult.transfers, // 轉帳方案
                    transferType: transfersResult.type, // 轉帳類型
                    totalOverpaid: transfersResult.totalOverpaid, // 總多付金額
                    totalUnderpaid: transfersResult.totalUnderpaid, // 總少付金額
                    averageBalance: transfersResult.averageBalance, // 平均每人應多付金額
                    balanceDetails: transfersResult.balanceDetails, // 每個人的調整明細
                    isFairSplit: enableFairSplit, // 標記是否使用公平分攤模式
                    daGeQuotaInfo: daGeQuotaInfo // 大哥扣打信息
                };
            };

            const summary = useMemo(() => calculateResults(expenses, applyPreviousBalance ? previousBalance : {}, useFairSplit, daGeQuota), [expenses, members, previousBalance, applyPreviousBalance, useFairSplit, daGeQuota]);

            // 獲取某個歷史記錄對應的上期餘額
            const getPreviousBalanceForRecord = (recordId) => {
                const recordIndex = history.findIndex(h => h.id === recordId);
                if (recordIndex < 0 || recordIndex >= history.length - 1) return {};
                
                const prevRecord = history[recordIndex + 1];
                const balance = {};
                Object.keys(prevRecord.summary.details).forEach(member => {
                    const detail = prevRecord.summary.details[member];
                    balance[member] = detail.paid - detail.shouldPay;
                });
                return balance;
            };

            const addExpense = (type) => {
                const defaultPayer = members.includes('二哥') ? '二哥' : members[0];
                const newExp = {
                    id: Date.now(),
                    title: type === 'public' ? '水電/瓦斯費(雙月)' : '個人當月支付',
                    amount: '',
                    type: type,
                    payer: type === 'public' ? defaultPayer : (members.length > 1 ? members[1] : members[0]),
                    splitWith: type === 'public' ? [...members] : []
                };
                setExpenses([newExp, ...expenses]);
            };

            const toggleSelectAll = (id) => {
                setExpenses(expenses.map(exp => {
                    if (exp.id === id) {
                        const isAll = exp.splitWith.length === members.length;
                        return { ...exp, splitWith: isAll ? [] : [...members] };
                    }
                    return exp;
                }));
            };

            const handleFinalize = () => {
                if (expenses.length === 0) return;
                if (confirmStep === 0) {
                    setConfirmStep(1);
                    setTimeout(() => setConfirmStep(0), 3000);
                    return;
                }
                const record = {
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    month: `${new Date().getFullYear()}年${new Date().getMonth() + 1}月`,
                    summary: summary,
                    rawExpenses: [...expenses],
                    daGeQuotaAtTime: daGeQuota // 保存結算時的扣打額度
                };
                setHistory([record, ...history]);
                setExpenses([]);
                setConfirmStep(0);
                
                // 🆕 更新大哥扣打額度（下期扣打 = 本期剩餘 + 1萬）
                if (summary.daGeQuotaInfo) {
                    setDaGeQuota(summary.daGeQuotaInfo.nextMonthQuota);
                }
                
                setActiveTab('history');
            };

            const handleEditRecord = (record) => {

                const recordIndex = history.findIndex(h => h.id === editingRecord.id);
                // 取得上一筆記錄的餘額（如果存在）
                const prevBalance = {};
                if (recordIndex < history.length - 1) {
                    const prevRecord = history[recordIndex + 1];
                    Object.keys(prevRecord.summary.details).forEach(member => {
                        const detail = prevRecord.summary.details[member];
                        prevBalance[member] = detail.paid - detail.shouldPay;
                    });
                }
                
                // 🆕 計算時傳入當前扣打額度（如果是最新一筆記錄）
                const isLatestRecord = recordIndex === 0;
                const quotaToUse = isLatestRecord ? daGeQuota : (editingRecord.daGeQuotaAtTime || 10000);
                const updatedSummary = calculateResults(editingRecord.rawExpenses, prevBalance, useFairSplit, quotaToUse);
                
                const updatedRecord = {
                    ...editingRecord,
                    summary: updatedSummary,
                    daGeQuotaAtTime: quotaToUse // 保存使用的扣打額度
                };
                setHistory(history.map(h => h.id === updatedRecord.id ? updatedRecord : h));
                setViewingRecord(updatedRecord);
                
                // 🆕 如果編輯的是最新一筆記錄，同步更新當前扣打額度
                if (isLatestRecord && updatedSummary.daGeQuotaInfo) {
                    setDaGeQuota(updatedSummary.daGeQuotaInfo.nextMonthQuota);
                }
                
                setEditingRecord(null);
                setIsEditMode(false);
            };

            const handleCancelEdit = () => {
                setEditingRecord(null);
                setIsEditMode(false);
            };

                setEditingRecord({
                    ...editingRecord,
                    rawExpenses: editingRecord.rawExpenses.map(exp =>

                setEditingRecord({
                    ...editingRecord,
                    rawExpenses: editingRecord.rawExpenses.map(exp => {

                                : [...exp.splitWith, member];
                            return { ...exp, splitWith };
                        }
                        return exp;
                    })

            };

                wsSummary['!cols'] = [{wch: 15}, {wch: 15}, {wch: 15}, {wch: 35}];

                                                <div className="flex items-center gap-2">
                                                    <SimpleIcon name="wallet" size={18} className="text-indigo-500" />
                                                    <h4 className="font-black text-slate-800 text-sm uppercase tracking-widest">支出清單 ({(isEditMode ? editingRecord : viewingRecord).rawExpenses.length} 筆) {isEditMode && <span className="text-rose-500 ml-2">編輯模式</span>}</h4>
                                                </div>
                                                {isEditMode && (
                                                    <div className="flex gap-1">
                                                        <button onClick={() => addEditingExpense('personal')} className="bg-white border border-amber-200 px-2 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 hover:bg-amber-50 text-amber-600 shadow-sm">
                                                            <SimpleIcon name="plus" size={12} /> 代墊
                                                        </button>
                                                        <button onClick={() => addEditingExpense('public')} className="bg-indigo-600 text-white px-2 py-1 rounded-lg text-[10px] font-bold flex items-center gap-1 hover:bg-indigo-700 shadow-sm">
                                                            <SimpleIcon name="plus" size={12} /> 公費
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                            <div className="space-y-3">
                                                {(isEditMode ? editingRecord : viewingRecord).rawExpenses.map(ex => (
                                                    <div key={ex.id} className={`p-4 rounded-2xl border ${isEditMode ? 'bg-white border-indigo-200' : 'bg-slate-50/50 border-slate-100'}`}>
                                                        {isEditMode ? (
                                                            <div className="space-y-3">
                                                                <div className="flex justify-between items-start gap-2">
                                                                    <div className="flex-1 flex items-center gap-2">
                                                                        <span className={`text-[9px] font-black px-1.5 py-0.5 rounded ${ex.type === 'public' ? 'bg-indigo-100 text-indigo-600' : 'bg-amber-100 text-amber-600'}`}>
                                                                            {ex.type === 'public' ? '公費' : '代墊'}
                                                                        </span>
                                                                        <input 
                                                                            className="flex-1 font-bold text-slate-800 text-sm outline-none border-b border-slate-200 focus:border-indigo-400 pb-1"
                                                                            value={ex.title}
                                                                            onChange={e => updateEditingExpense(ex.id, 'title', e.target.value)}
                                                                        />
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <input 
                                                                            type="number"
                                                                            className="w-24 font-black font-mono text-slate-700 text-right outline-none border-b border-slate-200 focus:border-indigo-400 pb-1"
                                                                            value={ex.amount}
                                                                            onChange={e => updateEditingExpense(ex.id, 'amount', e.target.value)}
                                                                        />
                                                                        <button onClick={() => deleteEditingExpense(ex.id)} className="text-rose-400 hover:text-rose-600">
                                                                            <SimpleIcon name="trash" size={16} />
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                                <div className="flex gap-4 pt-2 border-t">
                                                                    <div className="flex-1">
                                                                        <div className="flex items-center justify-between mb-1">
                                                                            <span className="text-[9px] font-bold text-slate-400 uppercase">分攤成員</span>
                                                                            <button onClick={() => toggleEditingSelectAll(ex.id)} className="text-[9px] text-indigo-500 font-bold hover:underline">
                                                                                {ex.splitWith.length === members.length ? '取消全選' : '全選'}
                                                                            </button>
                                                                        </div>
                                                                        <div className="flex flex-wrap gap-1">
                                                                            {members.map(m => (
                                                                                <button 
                                                                                    key={m}
                                                                                    onClick={() => toggleEditingSplitWith(ex.id, m)}
                                                                                    className={`text-[10px] px-2 py-1 rounded-lg font-bold transition-all ${ex.splitWith.includes(m) ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}
                                                                                >{m}</button>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                    <div>
                                                                        <span className="text-[9px] font-bold text-slate-400 uppercase block mb-1">支付者</span>
                                                                        <select 
                                                                            className="text-[11px] py-1 px-2 font-bold rounded-lg border outline-none cursor-pointer bg-slate-50"
                                                                            value={ex.payer}
                                                                            onChange={e => updateEditingExpense(ex.id, 'payer', e.target.value)}
                                                                        >
                                                                            {members.map(m => <option key={m} value={m}>{m}</option>)}
                                                                        </select>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="flex justify-between items-center">
                                                                <div className="space-y-1">
                                                                    <div className="flex items-center gap-2">
                                                                        <span className={`text-[9px] font-black px-1.5 py-0.5 rounded ${ex.type === 'public' ? 'bg-indigo-100 text-indigo-600' : 'bg-amber-100 text-amber-600'}`}>
                                                                            {ex.type === 'public' ? '公費' : '代墊'}
                                                                        </span>
                                                                        <p className="font-bold text-slate-800 text-sm">{ex.title || '無名稱項目'}</p>
                                                                    </div>
                                                                    <p className="text-[10px] text-slate-400 font-medium">支付者：{ex.type === 'public' ? '二哥' : ex.payer} | 分攤：{ex.splitWith.join(', ')}</p>
                                                                </div>
                                                                <p className="font-black font-mono text-slate-700">${Math.round(ex.amount).toLocaleString()}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* 成員分攤分析 */}
                                        <div className="space-y-6">
                                            <div className="flex items-center gap-2">
                                                <SimpleIcon name="users" size={18} className="text-indigo-500" />
                                                <h4 className="font-black text-slate-800 text-sm uppercase tracking-widest">成員分攤分析</h4>
                                            </div>
                                            <div className="bg-slate-900 rounded-[2rem] p-6 space-y-4">
                                                {members.map(m => {
                                                    const prevBalance = getPreviousBalanceForRecord(viewingRecord.id);
                                                    const currentRecord = isEditMode ? { ...editingRecord, summary: calculateResults(editingRecord.rawExpenses, prevBalance) } : viewingRecord;
                                                    const s = currentRecord.summary.details[m];
                                                    const prevBal = s.previousBalance || 0;
                                                    const net = s.shouldPay - s.paid;
                                                    return (
                                                        <div key={m} className="flex justify-between items-center border-b border-white/5 pb-4 last:border-0 last:pb-0">
                                                            <div>
                                                                <p className="text-white font-bold text-sm">{m}</p>
                                                                <p className="text-[10px] text-white/30 font-bold uppercase">
                                                                    {m === '大哥' && currentRecord.summary.daGeQuotaInfo ? (
                                                                        // 🆕 大哥扣打模式顯示（歷史紀錄）
                                                                        <>
                                                                            原應付 <span className="text-rose-300">${Math.round(currentRecord.summary.daGeQuotaInfo.originalShouldPay).toLocaleString()}</span>
                                                                            {" "}/ 扣打 <span className="text-amber-300">${Math.round(currentRecord.summary.daGeQuotaInfo.quotaAvailable).toLocaleString()}</span>
                                                                            {" "}→ 實付 <span className="text-emerald-300">${Math.round(currentRecord.summary.daGeQuotaInfo.actualShouldPay).toLocaleString()}</span>
                                                                            {" "}/ 已付 ${Math.round(s.paid).toLocaleString()}
                                                                            <br/>
                                                                            <span className="text-yellow-300">
                                                                                💰 本期扣打剩餘 ${Math.round(currentRecord.summary.daGeQuotaInfo.quotaRemaining).toLocaleString()} 
                                                                                {" "}→ 下期扣打 ${Math.round(currentRecord.summary.daGeQuotaInfo.nextMonthQuota).toLocaleString()}
                                                                            </span>
                                                                        </>
                                                                    ) : prevBal !== 0 ? (
                                                                        <>
                                                                            當期應付 ${Math.round(s.currentPeriodShouldPay || s.shouldPay).toLocaleString()} | 已付 ${Math.round(s.paid).toLocaleString()}
                                                                            <span className={prevBal > 0 ? "text-amber-300" : "text-rose-300"}>
                                                                                {" "}(上期{prevBal > 0 ? "多付" : "少付"}${Math.round(Math.abs(prevBal)).toLocaleString()})
                                                                            </span>
                                                                            <span className="text-white/50">
                                                                                {" "}→ 實際應付 ${Math.round(s.shouldPay).toLocaleString()}
                                                                            </span>
                                                                        </>
                                                                    ) : (
                                                                        <>應付 ${Math.round(s.shouldPay).toLocaleString()} | 已付 ${Math.round(s.paid).toLocaleString()}</>
                                                                    )}
                                                                </p>
                                                            </div>
                                                            <div className="text-right">
                                                                <p className={`text-sm font-black font-mono ${
                                                                    m === '二哥' 
                                                                        ? (net < 0 ? 'text-indigo-400' : net > 0 ? 'text-rose-400' : 'text-emerald-400')
                                                                        : (net > 0 ? 'text-rose-400' : (net < 0 ? 'text-amber-400' : 'text-emerald-400'))
                                                                }`}>
                                                                    {net !== 0 ? `$${Math.round(Math.abs(net)).toLocaleString()}` : '已結清'}
                                                                </p>
                                                                <p className={`text-[10px] font-bold ${
                                                                    m === '二哥' 
                                                                        ? (net < 0 ? 'text-indigo-300' : net > 0 ? 'text-rose-300' : 'text-emerald-300')
                                                                        : (net > 0 ? 'text-rose-300' : (net < 0 ? 'text-amber-300' : 'text-emerald-300'))
                                                                }`}>
                                                                    {m === '二哥' 
                                                                        ? (net < 0 ? '多付金額' : (net > 0 ? '需補款項' : '無欠款'))
                                                                        : (net > 0 ? '需補款項' : (net < 0 ? '多付金額' : '無欠款'))
                                                                    }
                                                                </p>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            
                                            {/* 公用基金卡片 */}
                                            <div className="bg-indigo-600 rounded-[2rem] p-6 text-white shadow-xl shadow-indigo-100 relative overflow-hidden">
                                                <div className="relative z-10">
                                                    {(() => {
                                                        const prevBalance = getPreviousBalanceForRecord(viewingRecord.id);
                                                        const currentRecord = isEditMode ? { ...editingRecord, summary: calculateResults(editingRecord.rawExpenses, prevBalance) } : viewingRecord;
                                                        const publicFund = currentRecord.summary.publicFund || currentRecord.summary.refundNeeded || (() => {
                                                            let fund = 0;
                                                            Object.keys(currentRecord.summary.details).forEach(m => {
                                                                const s = currentRecord.summary.details[m];
                                                                const net = s.shouldPay - s.paid;
                                                                if (net < 0) fund += Math.abs(net);
                                                            });
                                                            return fund;
                                                        })();
                                                        return publicFund > 0 ? (
                                                            <div>
                                                                <div className="flex items-center gap-2 text-emerald-300 mb-2">
                                                                    <SimpleIcon name="wallet" size={18} />
                                                                    <p className="text-xs font-black uppercase tracking-widest">公用基金餘額</p>
                                                                </div>
                                                                <p className="text-4xl font-black font-mono text-white mb-2">
                                                                    ${Math.round(publicFund).toLocaleString()}
                                                                </p>
                                                                <p className="text-sm text-white/80 font-medium">大家多付的部分，可作為下期抵扣</p>
                                                            </div>
                                                        ) : (
                                                            <div>
                                                                <div className="flex items-center gap-2 text-white/60 mb-2">
                                                                    <SimpleIcon name="check" size={18} />
                                                                    <p className="text-xs font-black uppercase tracking-widest">帳務狀態</p>
                                                                </div>
                                                                <p className="text-2xl font-black text-white mb-1">已結清</p>
                                                                <p className="text-sm text-white/60 font-medium">目前無公用基金餘額</p>
                                                            </div>
                                                        );
                                                    })()}
                                                </div>
                                            </div>
                                            
                                            {/* 優化轉帳建議（歷史記錄） */}
                                            {(() => {
                                                const prevBalance = getPreviousBalanceForRecord(viewingRecord.id);
                                                const currentRecord = isEditMode ? { ...editingRecord, summary: calculateResults(editingRecord.rawExpenses, prevBalance) } : viewingRecord;
                                                const transfers = currentRecord.summary.transfers || [];
                                                const transferType = currentRecord.summary.transferType || 'normal';
                                                
                                                // 正常轉帳建議
                                                if (transfers.length > 0 && transferType === 'normal') {
                                                    return (
                                                        <div className="bg-gradient-to-br from-emerald-500/20 to-teal-500/20 border border-emerald-400/30 rounded-2xl p-5 space-y-3">
                                                            <div className="flex items-start gap-2">
                                                                <div className="p-2 bg-emerald-500/20 rounded-lg">
                                                                    <SimpleIcon name="chevronRight" size={16} className="text-emerald-400" />
                                                                </div>
                                                                <div className="flex-1">
                                                                    <p className="text-xs font-black text-emerald-700 uppercase mb-1">最優轉帳方案</p>
                                                                    <p className="text-[10px] text-slate-600 font-medium">共需 {transfers.length} 筆轉帳即可完成結算</p>
                                                                </div>
                                                            </div>
                                                            
                                                            <div className="space-y-2">
                                                                {transfers.map((transfer, idx) => (
                                                                    <div key={idx} className="flex items-center gap-3 bg-white/80 p-3 rounded-xl border border-emerald-200/50">
                                                                        <div className="flex-1 flex items-center gap-2">
                                                                            <div className="bg-rose-100 text-rose-700 px-3 py-1 rounded-lg text-xs font-black">
                                                                                {transfer.from}
                                                                            </div>
                                                                            <SimpleIcon name="chevronRight" size={14} className="text-slate-400" />
                                                                            <div className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-xs font-black">
                                                                                {transfer.to}
                                                                            </div>
                                                                        </div>
                                                                        <div className="text-right">
                                                                            <p className="text-base font-black font-mono text-amber-600">
                                                                                ${transfer.amount.toLocaleString()}
                                                                            </p>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                            
                                                            <p className="text-[9px] text-slate-500 font-medium text-center pt-1">
                                                                💡 按照以上方案轉帳，即可完成結算
                                                            </p>
                                                        </div>
                                                    );
                                                }
                                                
                                                // 所有人都多付
                                                if (transferType === 'all_overpaid') {
                                                    return (
                                                        <div className="bg-gradient-to-br from-amber-500/20 to-orange-500/20 border border-amber-400/30 rounded-2xl p-5 space-y-3">
                                                            <div className="flex items-start gap-2">
                                                                <div className="p-2 bg-amber-500/20 rounded-lg">
                                                                    <SimpleIcon name="wallet" size={16} className="text-amber-600" />
                                                                </div>
                                                                <div className="flex-1">
                                                                    <p className="text-xs font-black text-amber-700 uppercase mb-1">公平分攤計算</p>
                                                                    <p className="text-[10px] text-slate-600 font-medium">總計多付 ${Math.round(currentRecord.summary.totalOverpaid || 0).toLocaleString()}，已自動平均分攤</p>
                                                                </div>
                                                            </div>
                                                            
                                                            {/* 平均值 */}
                                                            <div className="bg-white/80 p-3 rounded-xl border border-amber-200/50">
                                                                <p className="text-[9px] text-slate-500 font-bold mb-1">每人平均多付</p>
                                                                <p className="text-xl font-black font-mono text-amber-700">${Math.round(currentRecord.summary.averageBalance || 0).toLocaleString()}</p>
                                                            </div>

                                                            {/* 轉帳方案 */}
                                                            {transfers.length > 0 && (
                                                                <div className="space-y-2">
                                                                    <p className="text-[9px] text-slate-600 font-bold">轉帳方案（{transfers.length} 筆）：</p>
                                                                    {transfers.map((transfer, idx) => (
                                                                        <div key={idx} className="flex items-center gap-3 bg-white/80 p-3 rounded-xl border border-amber-200/50">
                                                                            <div className="flex-1 flex items-center gap-2">
                                                                                <div className="bg-rose-100 text-rose-700 px-3 py-1 rounded-lg text-xs font-black">
                                                                                    {transfer.from}
                                                                                </div>
                                                                                <SimpleIcon name="chevronRight" size={14} className="text-slate-400" />
                                                                                <div className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-xs font-black">
                                                                                    {transfer.to}
                                                                                </div>
                                                                            </div>
                                                                            <div className="text-right">
                                                                                <p className="text-base font-black font-mono text-amber-600">
                                                                                    ${transfer.amount.toLocaleString()}
                                                                                </p>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                            
                                                            <div className="bg-white/80 p-3 rounded-xl text-[10px] text-slate-600 font-medium">
                                                                ✨ 完成轉帳後，每個人都多付 ${Math.round(currentRecord.summary.averageBalance || 0).toLocaleString()}，達到完全公平
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                
                                                // 所有人都少付
                                                if (transferType === 'all_underpaid') {
                                                    return (
                                                        <div className="bg-gradient-to-br from-rose-500/20 to-red-500/20 border border-rose-400/30 rounded-2xl p-5 space-y-3">
                                                            <div className="flex items-start gap-2">
                                                                <div className="p-2 bg-rose-500/20 rounded-lg">
                                                                    <SimpleIcon name="x" size={16} className="text-rose-600" />
                                                                </div>
                                                                <div className="flex-1">
                                                                    <p className="text-xs font-black text-rose-700 uppercase mb-1">所有人都少付了</p>
                                                                    <p className="text-[10px] text-slate-600 font-medium">總共短缺 ${Math.round(currentRecord.summary.totalUnderpaid || 0).toLocaleString()}</p>
                                                                </div>
                                                            </div>
                                                            <div className="bg-white/80 p-3 rounded-xl text-[10px] text-slate-600 font-medium">
                                                                ⚠️ 請檢查支出項目是否有遺漏或設定錯誤
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                
                                                return null;
                                            })()}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-6 bg-slate-50 border-t flex justify-center gap-3">
                                    {isEditMode ? (
                                        <>
                                            <button onClick={handleCancelEdit} className="px-8 py-3 bg-white border border-slate-200 rounded-2xl text-slate-600 font-bold text-sm hover:bg-slate-100 transition-colors shadow-sm">
                                                取消編輯
                                            </button>
                                            <button onClick={handleSaveEdit} className="px-8 py-3 bg-indigo-600 text-white rounded-2xl font-bold text-sm hover:bg-indigo-700 transition-colors shadow-md">
                                                保存修改
                                            </button>
                                        </>
                                    ) : (
                                        <button onClick={() => { setViewingRecord(null); setIsEditMode(false); setEditingRecord(null); }} className="px-8 py-3 bg-white border border-slate-200 rounded-2xl text-slate-600 font-bold text-sm hover:bg-slate-100 transition-colors shadow-sm">
                                            關閉報表
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 成員管理 Modal */}
                    {isMemberModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={() => setIsMemberModalOpen(false)}>
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="p-6 border-b bg-slate-50 flex justify-between items-center">
                                    <h3 className="font-black text-slate-800 text-lg">成員管理</h3>
                                    <button onClick={() => setIsMemberModalOpen(false)} className="text-slate-400 hover:text-slate-600"><SimpleIcon name="x" size={20} /></button>
                                </div>
                                <div className="p-6 space-y-6">
                                    <div className="space-y-3">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">現有成員 ({members.length})</p>
                                        <div className="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                                            {members.map(m => (
                                                <div key={m} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                    <span className="font-bold text-slate-700">{m}</span>
                                                    <button 
                                                        onClick={() => handleRemoveMember(m)}
                                                        className="text-slate-300 hover:text-rose-500 transition-colors p-1"
                                                        title="移除成員"
                                                    >
                                                        <SimpleIcon name="trash" size={16} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="pt-6 border-t border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">新增成員</p>
                                        <div className="flex gap-2">
                                            <input 
                                                className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-bold text-slate-700 outline-none focus:border-indigo-300 transition-colors"
                                                placeholder="輸入成員名稱..."
                                                value={newMemberName}
                                                onChange={e => setNewMemberName(e.target.value)}
                                                onKeyDown={e => e.key === 'Enter' && handleAddMember()}
                                            />
                                            <button 
                                                onClick={handleAddMember}
                                                disabled={!newMemberName}
                                                className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md"
                                            >
                                                新增
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
